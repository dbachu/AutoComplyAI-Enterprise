version: "3.9"

services:

  postgres:
    image: postgres:15
    container_name: autocomply_postgres
    environment:
      POSTGRES_USER: autocomply
      POSTGRES_PASSWORD: autocomply
      POSTGRES_DB: autocomply
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: autocomply_backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgresql://autocomply:autocomply@postgres:5432/autocomply

  frontend:
    build: ./frontend
    container_name: autocomply_frontend
    command: npm run dev -- --host
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  pgdata: